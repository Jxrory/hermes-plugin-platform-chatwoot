name: chatwoot-platform
label: Chatwoot
kind: platform
version: 1.0.0
description: >
  Chatwoot Agent Bot adapter for Hermes Agent.
  Receives webhook events from Chatwoot (message_created) and replies as an
  AI agent bot via the Chatwoot API. Supports conversation history,
  agent skills, and per-conversation sessions.
author: Jxrory
requires_env:
  - name: CHATWOOT_API_ACCESS_TOKEN
    description: "Chatwoot API access token for posting replies"
    prompt: "Chatwoot API access token"
    password: true
  - name: CHATWOOT_WEBHOOK_SECRET
    description: "HMAC secret for x-chatwoot-signature verification"
    prompt: "Chatwoot webhook secret"
    password: true
  - name: CHATWOOT_BASE_URL
    description: "Chatwoot server URL (e.g. https://chatwoot.example.com)"
    prompt: "Chatwoot base URL"
    password: false
optional_env:
  - name: CHATWOOT_WEBHOOK_PORT
    description: "Local port for the webhook listener (default 8646)"
    prompt: "Webhook listen port"
    password: false
  - name: CHATWOOT_WEBHOOK_PATH
    description: "URL path for webhook (default /webhooks/chatwoot)"
    prompt: "Webhook path"
    password: false
  - name: CHATWOOT_WEBHOOK_HOST
    description: "Listen address (default 0.0.0.0)"
    prompt: "Listen host"
    password: false
